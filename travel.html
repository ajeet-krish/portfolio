<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital CV | Ajeet Krishnasamy</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xz/fonts@1/serve/meslo-lg.min.css">
    <link rel="stylesheet" href="css/main.css">

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
</head>
<body>

<nav class="top-nav">
    <a href="index.html" style="color: var(--purple);">[ 01. Home ]</a>
    <a href="projects.html" style="color: var(--cyan);">[ 02. Projects ]</a>
    <a href="travel.html" style="color: var(--green);">[ 03. Travel ]</a>
</nav>

<div class="container">
    <div class="breadcrumb">
        ~ / portfolio / <span style="color: var(--pink);">travel.py</span>
    </div>

    <div class="section-header" style="color: var(--purple);"># Exploring The Grand Line</div>

    <div class="card">
        <div>
            Work in progress.
        </div>
    </div>

    <div class="travel-wrapper">
        <aside class="location-sidebar">
            <div class="section-header" style="color: var(--orange);"># Where I've Been</div>
            <ul id="location-menu"></ul>
        </aside>

        <div id="map"></div>
    </div>
</div>

<script>
    // --- 1. INITIALIZE THE MAP ---
    // Target the 'map' div, set center coordinates [Lat, Lon], and initial zoom level.
    const map = L.map('map').setView([43.59, -79.62], 10);

    // --- 2. ADD TILE LAYER (BASEMAP) ---
    L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
        subdomains: 'abcd',
        maxZoom: 19
    }).addTo(map);

    // Custom LUFFY icon
    const travelIcon = L.icon({
        iconUrl: 'assets/img/luffy_icons.png', // Path to your PNG
        iconSize: [100, 100],     // Width and height of the icon in pixels
        iconAnchor: [50, 100],    // Point of the icon which will correspond to marker's location
        popupAnchor: [0, -75]    // Point from which the popup should open relative to the iconAnchor
    });

    // Define locations
    const locations = [
        { name: "Mississauga", coords: [43.59, -79.62], country: "Canada", zoom: 12, img: "assets/img/mississauga.jpg" },
        { name: "Ottawa", coords: [45.41, -75.67], country: "Canada",  zoom: 12, img: "assets/img/ottawa.jpg" },
        { name: "Chennai", coords: [13.04, 80.14], country: "India", zoom: 12, img: "assets/img/chennai.jpg" },
        { name: "Melbourne", coords: [-37.8136, 144.9631], country: "Australia",  zoom: 12, img: "assets/img/melbourne.jpg" },
        { name: "Bangkok", coords: [13.7563, 100.5018], country: "Thailand", zoom: 12, img: "assets/img/bangkok.jpg" },
        { name: "New Delhi", coords: [27.17, -78.04], country: "India", zoom: 12, img: "assets/img/newdelhi.jpg" },
        { name: "Los Angeles", coords: [34.10, -118.34], country: "United States", zoom: 11, img: "assets/img/losangeles.jpg" }
    ];

    const menu = document.getElementById('location-menu');

    // 4. Initialization Logic
    locations.forEach(loc => {
        // Create the Leaflet Marker
        const marker = L.marker(loc.coords, { icon: travelIcon }).addTo(map);

        const popupContent = `
            <div style="text-align: center; width: 150px;">
                <span style="color: #ff79c6; font-weight: bold;">${loc.name}</span><br>
                <img src="${loc.img}" style="width: 100%; margin-top: 8px;">
            </div>
        `;
        marker.bindPopup(popupContent);

        // Create the Card-Style Menu Item
        const li = document.createElement('li');
        li.className = 'menu-item';
        li.innerHTML = `
            <div class="card-title">${loc.name}</div>
            <div class="card-meta">
                LOC: ${loc.coords[0].toFixed(2)}, ${loc.coords[1].toFixed(2)} | ${loc.country || 'Global'}
            </div>
        `;

        // Add click behavior
        li.addEventListener('click', () => {
            // Smooth zoom to location
            map.flyTo(loc.coords, loc.zoom, {
                duration: 1.5 // Duration in seconds
            });
            // Open popup after a short delay
            setTimeout(() => marker.openPopup(), 1500);
        });

        menu.appendChild(li);
    });

    // Force Leaflet to recalculate tiles for the fluid width container
    window.addEventListener('resize', () => {
        map.invalidateSize();
    });
    setTimeout(() => {map.invalidateSize();
    }, 200);
</script>

</body>
</html>
